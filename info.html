<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M — Info</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: auto;
      overflow-y: auto;
    }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
    }

    .phone {
      max-width: 390px;
      width: 100%;
      position: relative;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      width: 100%;
      height: 52px;
      background: #2D2D32;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
    }

    .logo-img {
      height: 23px;
      width: auto;
    }

    /* ── BG IMAGE ── */
    .bg-image {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="phone">

    <header>
      <a href="index.html">
        <img class="logo-img" src="logo.png" alt="logo" />
      </a>
    </header>

    <img class="bg-image" src="sub.png" alt="" />

  </div>
</body>
</html>
