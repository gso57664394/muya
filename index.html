<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: auto;
      overflow-y: auto;
    }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
    }

    .phone {
      max-width: 390px;
      width: 100%;
      position: relative;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      left: 0;
      transform: none;
      width: 100%;
      max-width: 100%;
      height: 52px;
      background: #2D2D32;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
    }

    .logo {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 24px;
      color: #ffffff;
      letter-spacing: 0.02em;
    }

    .logo-img {
      height: 23px;
      width:auto;
    }

    /* ── BG IMAGE ── */
    .bg-image {
      width: 100%;
      height: auto;
      display: block;
      margin-top: 0; /* 헤더 높이만큼 밀어주기 */
    }

    /* ── FLOATING CTA ── */
    .cta {
      position: fixed;
      bottom: 24px;
      right: 24px;
      left: auto;
      transform: none;
      width: auto;
      max-width: none;
      display: flex;
      z-index: 100;
    }

    .cta-btn {
      background: #2D2D32;
      color: #ffffff;  
      border: none;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 100;
      font-stretch: condensed;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: lowercase;
    }

    .cta-btn .arrows {
      font-size: 15px;
      letter-spacing: -3px;
    }
  </style>
</head>
<body>
  <div class="phone">

    <header>
      <img class="logo-img" src="logo.png" alt="logo" />
    </header>

    <img class="bg-image" src="main.jpg" alt="" />

    <div class="cta">
      <button class="cta-btn"onclick="location.href='info.html'">
        <span>more info</span>
        <span class="arrows">»</span>
      </button>
    </div>

  </div>
</body>
</html>
